<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .game-board {
            background: #000;
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            min-width: 200px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 28px;
            text-align: center;
        }

        .score-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .score-label {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 32px;
            font-weight: bold;
        }

        .next-piece {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .next-piece h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .controls {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 10px;
        }

        .controls h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .controls ul {
            list-style: none;
            padding: 0;
        }

        .controls li {
            padding: 5px 0;
            color: #555;
            font-size: 14px;
        }

        .controls kbd {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
            font-family: monospace;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
        }

        .game-over h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 36px;
        }

        .game-over p {
            color: #555;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
        
        <div class="info-panel">
            <h1>俄罗斯方块</h1>
            
            <div class="score-display">
                <div class="score-label">得分</div>
                <div class="score-value" id="score">0</div>
            </div>
            
            <div class="next-piece">
                <h3>下一个方块</h3>
                <canvas id="nextPiece" width="100" height="100"></canvas>
            </div>
            
            <div class="controls">
                <h3>游戏控制</h3>
                <ul>
                    <li><kbd>←</kbd> 左移</li>
                    <li><kbd>→</kbd> 右移</li>
                    <li><kbd>↓</kbd> 加速下落</li>
                    <li><kbd>↑</kbd> 旋转</li>
                    <li><kbd>空格</kbd> 直接落下</li>
                </ul>
            </div>
            
            <button class="start-btn" id="startBtn">开始游戏</button>
        </div>
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPiece');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        
        const COLORS = [
            '#000000',
            '#FF0D72', // I - 红色
            '#0DC2FF', // O - 蓝色
            '#0DFF72', // T - 绿色
            '#F538FF', // S - 紫色
            '#FF8E0D', // Z - 橙色
            '#FFE138', // J - 黄色
            '#3877FF'  // L - 深蓝色
        ];
        
        const SHAPES = [
            [],
            [[1, 1, 1, 1]], // I
            [[1, 1], [1, 1]], // O
            [[0, 1, 0], [1, 1, 1]], // T
            [[0, 1, 1], [1, 1, 0]], // S
            [[1, 1, 0], [0, 1, 1]], // Z
            [[1, 0, 0], [1, 1, 1]], // J
            [[0, 0, 1], [1, 1, 1]]  // L
        ];
        
        let board = [];
        let score = 0;
        let currentPiece = null;
        let nextPiece = null;
        let gameInterval = null;
        let isGameOver = false;
        let isPaused = false;
        
        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = 0;
                }
            }
        }
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }
        
        function lightenColor(color, percent) {
            const rgb = hexToRgb(color);
            if (!rgb) return color;
            
            const amt = Math.round(2.55 * percent);
            const r = Math.min(255, rgb.r + amt);
            const g = Math.min(255, rgb.g + amt);
            const b = Math.min(255, rgb.b + amt);
            
            return `rgb(${r}, ${g}, ${b})`;
        }
        
        function darkenColor(color, percent) {
            const rgb = hexToRgb(color);
            if (!rgb) return color;
            
            const amt = Math.round(2.55 * percent);
            const r = Math.max(0, rgb.r - amt);
            const g = Math.max(0, rgb.g - amt);
            const b = Math.max(0, rgb.b - amt);
            
            return `rgb(${r}, ${g}, ${b})`;
        }
        
        function drawBlock(context, x, y, color) {
            const size = BLOCK_SIZE;
            const px = x * size;
            const py = y * size;
            
            // 创建渐变效果
            const gradient = context.createLinearGradient(px, py, px + size, py + size);
            gradient.addColorStop(0, lightenColor(color, 40));
            gradient.addColorStop(0.3, lightenColor(color, 20));
            gradient.addColorStop(0.7, color);
            gradient.addColorStop(1, darkenColor(color, 30));
            
            // 绘制主方块
            context.fillStyle = gradient;
            context.fillRect(px, py, size, size);
            
            // 添加内阴影效果
            context.fillStyle = 'rgba(0, 0, 0, 0.4)';
            context.fillRect(px + 2, py + size - 5, size - 4, 3);
            context.fillRect(px + size - 5, py + 2, 3, size - 4);
            
            // 添加高光效果
            const highlightGradient = context.createLinearGradient(px, py, px + size, py + size);
            highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
            highlightGradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.2)');
            highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            
            context.fillStyle = highlightGradient;
            context.fillRect(px + 4, py + 4, size - 8, size - 8);
            
            // 添加边框
            context.strokeStyle = lightenColor(color, 60);
            context.lineWidth = 2;
            context.strokeRect(px, py, size, size);
            
            // 添加外发光效果
            context.shadowColor = color;
            context.shadowBlur = 10;
            context.shadowOffsetX = 0;
            context.shadowOffsetY = 0;
            context.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            context.lineWidth = 1;
            context.strokeRect(px + 1, py + 1, size - 2, size - 2);
            
            // 重置阴影
            context.shadowBlur = 0;
        }
        
        function drawBoard() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c, r, COLORS[board[r][c]]);
                    }
                }
            }
        }
        
        function drawPiece(piece, context, offsetX, offsetY) {
            piece.shape.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value !== 0) {
                        drawBlock(context, piece.x + c + offsetX, piece.y + r + offsetY, COLORS[piece.color]);
                    }
                });
            });
        }
        
        function drawNextPiece() {
            nextCtx.fillStyle = '#f5f7fa';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                const offsetX = (nextCanvas.width / BLOCK_SIZE - nextPiece.shape[0].length) / 2;
                const offsetY = (nextCanvas.height / BLOCK_SIZE - nextPiece.shape.length) / 2;
                
                nextPiece.shape.forEach((row, r) => {
                    row.forEach((value, c) => {
                        if (value !== 0) {
                            drawBlock(nextCtx, offsetX + c, offsetY + r, COLORS[nextPiece.color]);
                        }
                    });
                });
            }
        }
        
        function createPiece() {
            const type = Math.floor(Math.random() * 7) + 1;
            return {
                shape: SHAPES[type],
                color: type,
                x: Math.floor(COLS / 2) - Math.floor(SHAPES[type][0].length / 2),
                y: 0
            };
        }
        
        function collision(piece, offsetX, offsetY) {
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c]) {
                        const newX = piece.x + c + offsetX;
                        const newY = piece.y + r + offsetY;
                        
                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }
                        
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        function rotate(piece) {
            const newShape = piece.shape[0].map((_, i) =>
                piece.shape.map(row => row[i]).reverse()
            );
            
            const newPiece = {
                ...piece,
                shape: newShape
            };
            
            if (!collision(newPiece, 0, 0)) {
                piece.shape = newShape;
            } else if (!collision(newPiece, 1, 0)) {
                piece.shape = newShape;
                piece.x += 1;
            } else if (!collision(newPiece, -1, 0)) {
                piece.shape = newShape;
                piece.x -= 1;
            }
        }
        
        function lockPiece() {
            currentPiece.shape.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value !== 0) {
                        const boardY = currentPiece.y + r;
                        const boardX = currentPiece.x + c;
                        
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                });
            });
            
            clearLines();
            spawnPiece();
        }
        
        function clearLines() {
            let linesCleared = 0;
            
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== 0)) {
                    board.splice(r, 1);
                    board.unshift(new Array(COLS).fill(0));
                    linesCleared++;
                    r++;
                }
            }
            
            if (linesCleared > 0) {
                score += linesCleared * 100 * linesCleared;
                document.getElementById('score').textContent = score;
            }
        }
        
        function spawnPiece() {
            currentPiece = nextPiece || createPiece();
            nextPiece = createPiece();
            drawNextPiece();
            
            if (collision(currentPiece, 0, 0)) {
                gameOver();
            }
        }
        
        function moveDown() {
            if (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }
        }
        
        function moveLeft() {
            if (!collision(currentPiece, -1, 0)) {
                currentPiece.x--;
            }
        }
        
        function moveRight() {
            if (!collision(currentPiece, 1, 0)) {
                currentPiece.x++;
            }
        }
        
        function hardDrop() {
            while (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            lockPiece();
            document.getElementById('score').textContent = score;
        }
        
        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function resetGame() {
            initBoard();
            score = 0;
            document.getElementById('score').textContent = score;
            isGameOver = false;
            isPaused = false;
            document.getElementById('gameOver').style.display = 'none';
            
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            nextPiece = null;
            spawnPiece();
            
            gameInterval = setInterval(() => {
                if (!isPaused && !isGameOver) {
                    moveDown();
                    draw();
                }
            }, 1000);
        }
        
        function draw() {
            drawBoard();
            if (currentPiece) {
                drawPiece(currentPiece, ctx, 0, 0);
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowDown':
                    moveDown();
                    break;
                case 'ArrowUp':
                    rotate(currentPiece);
                    break;
                case ' ':
                    hardDrop();
                    break;
            }
            
            if (!isPaused) {
                draw();
            }
            
            e.preventDefault();
        });
        
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameInterval) {
                resetGame();
            }
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            resetGame();
        });
        
        initBoard();
        drawBoard();
    </script>
</body>
</html>
